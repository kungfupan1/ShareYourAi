version: '3.8'

services:
  # ==================== Redis 缓存 ====================
  redis:
    image: redis:alpine
    container_name: shareyouai_redis
    restart: always
    volumes:
      - ./redis_data:/data
    command: redis-server --appendonly yes

  # ==================== Python 后端 ====================
  backend:
    build: ./backend
    image: shareyouai-backend:latest
    container_name: shareyouai_backend
    depends_on:
      - redis
    environment:
      - REDIS_URL=redis://redis:6379/0
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    ports:
      - "8000:8000"   # 【已修改】将后端 8000 端口直接暴露给宿主机，方便你服务器A直接调用或调试
    volumes:
      - ./backend/share_you_ai.db:/app/share_you_ai.db  # 数据库名称已更新
      - ./backend/uploads:/app/uploads
    restart: always

  # ==================== Nginx 前端网关 ====================
  nginx:
    image: nginx:alpine
    container_name: shareyouai_nginx
    ports:
      - "8082:8082"    # 宿主机 8082 → 容器 8082
    volumes:
      - ./admin-web/dist:/usr/share/nginx/html/admin  # 【已修改】只有管理后台
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./backend/uploads:/app/uploads:ro
    depends_on:
      - backend
    restart: always